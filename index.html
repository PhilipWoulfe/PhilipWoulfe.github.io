	<script>
    	function days() {
			var d1 = new Date('1945', '4', '7');
			var d2 = new Date();
			d2.setHours(0, 0, 0, 0);
			return Math.round((d2-d1)/(1000*60*60*24))
		}

		$(document).ready( function() {
			$(".content").text("it has been " + days() + " days since Germany was last seriously up to something.");
		});
	</script>
